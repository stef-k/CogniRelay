<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${title}</title>
  <script>
    (function () {
      var theme = "dark";
      try {
        var stored = window.localStorage.getItem("cognirelay-ui-theme");
        if (stored === "light" || stored === "dark") {
          theme = stored;
        }
      } catch (_err) {}
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="/ui/static/mu.slate.css">
  <link rel="stylesheet" href="/ui/static/ui.css">
  <script defer src="/ui/static/ui_live.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="shell">
      <div>
        <p class="eyebrow">CogniRelay</p>
        <h1 class="page-title">${title}</h1>
      </div>
      <div class="header-controls">
        <nav class="site-nav">
          <a class="${overview_nav_class}" href="/ui/">Overview</a>
          <a class="${continuity_nav_class}" href="/ui/continuity">Continuity</a>
        </nav>
        <label class="theme-control" for="theme-select">
          <span>Theme</span>
          <select id="theme-select" data-theme-select>
            <option value="dark" selected="selected">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
      </div>
    </div>
  </header>
  <main class="shell">
    ${content}
  </main>
</body>
</html>
