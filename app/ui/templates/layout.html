<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${title}</title>
  <script>
    (function () {
      var theme = "dark";
      try {
        var stored = window.localStorage.getItem("cognirelay-ui-theme");
        if (stored === "light" || stored === "dark") {
          theme = stored;
        }
      } catch (_err) {}
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="/ui/static/mu.slate.css">
  <link rel="stylesheet" href="/ui/static/ui.css">
  <script defer src="/ui/static/ui_live.js"></script>
</head>
<body id="top">
  <header class="site-header">
    <div class="shell">
      <div class="header-title-block">
        <p class="eyebrow">CogniRelay</p>
        <h1 class="page-title">${title}</h1>
      </div>
      <div class="header-controls">
        <nav class="site-nav">
          <a class="${overview_nav_class}" href="/ui/">Overview</a>
          <a class="${continuity_nav_class}" href="/ui/continuity">Continuity</a>
          <a class="${tasks_nav_class}" href="/ui/tasks">Tasks</a>
          <a class="${schedule_nav_class}" href="/ui/schedule">Schedule</a>
          <a class="${retrieval_nav_class}" href="/ui/context">Retrieval</a>
          <a class="${graph_nav_class}" href="/ui/graph">Graph</a>
          <a class="${docs_nav_class}" href="/ui/docs">Docs</a>
        </nav>
        <label class="theme-control" for="theme-select">
          <span>Theme</span>
          <select id="theme-select" data-theme-select>
            <option value="dark" selected="selected">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
      </div>
    </div>
  </header>
  <main class="shell">
    ${content}
  </main>
  <footer class="site-footer">
    <div class="shell site-footer-inner">
      <p>Copyright 2026 CogniRelay</p>
      <p><a href="https://github.com/stef-k/CogniRelay" target="_blank" rel="noreferrer">Project on GitHub</a></p>
    </div>
  </footer>
  <a class="back-to-top" href="#top" aria-label="Back to top" data-back-to-top>Top</a>
</body>
</html>
